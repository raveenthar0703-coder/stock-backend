<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price Predictor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js CDN -->
</head>
<body>
    <div class="container">
        <h1>Stock Price Predictor</h1>
        <form id="predict-form">
            <label for="ticker">Stock Ticker:</label>
            <input type="text" id="ticker" placeholder="e.g., AAPL" required>
            
            <label for="days">Days to Predict:</label>
            <input type="number" id="days" min="1" max="365" value="30" required>
            
            <button type="submit">Predict</button>
        </form>
        
        <div id="results">
            <h2>Predictions for <span id="ticker-display"></span></h2>
            <canvas id="price-chart" width="400" height="200"></canvas>
            <table id="prediction-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Predicted Price</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
